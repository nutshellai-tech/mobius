# Mobius 文档站点配置 (mkdocs-material + i18n)
# 本地预览: mkdocs serve   |   构建: mkdocs build

site_name: Mobius
site_url: https://nutshellai-tech.github.io/mobius/
site_description: Mobius — A Self-Evolving Agent Operating System
docs_dir: docs

repo_url: https://github.com/nutshellai-tech/mobius
repo_name: nutshellai-tech/mobius
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.edit
  palette:
    - scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换深色模式
    - scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换浅色模式
  icon:
    logo: material/all-inclusive

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: zh
          default: true
          name: 简体中文
          build: true
          nav_translations:
            Home: 首页
            "I. Master Mobius in 5 Minutes": I-五分钟精通
            "Xiaomo: Universal Shortcut": 万能捷径：小莫助理
            "Concepts: Import a Project": 概念入门：导入项目并开启首个任务
            "Concepts: Skills & Memory": 概念入门：技能与记忆
            "II. Advanced Capabilities": II-高级能力
            "Add Remote Compute": 添加远程算力
            "Declare Cooperable Computers": 声明可合作计算机
            "Connect from Your PC (aimux)": 从个人电脑连接（aimux）
            "Xiaomo Assistant (Web)": 小莫助手 Web 端
            "Prevent Agent Idle (Patrol & Nudge)": 防止 Agent 偷懒
            "Exclude Skills & Memory": 屏蔽无关技能与记忆
            "View Current Knowledge": 查看当前知识
            "Migrate Skills & Memory": 迁移 Skill 和 Memory
            "Search Session Content": 跨会话搜索内容
            "Switch Workspace Layout": 切换工作区布局
            "III. Admin Basics": III-管理员基础
            "Add a User": 添加用户
            "Monitor Agents": 监控智能体
            "Configure Codex + a Model": 配置 Codex + 模型
            "Configure Claude Code + a Model": 配置 Claude Code + 模型
            "Limit Model Call Frequency": 限制模型调用频率
            "IV. Mobius Self-Evolution": IV-自我进化能力
            "Simple Self-Evolution Example": 简单自进化示例
            "V. Tips": V-小技巧
            "Chat Input Tips": 聊天输入小技巧
            "Switch the Model Mid-Session": 中途切换模型
            "Change the Frontend Theme": 修改前端色彩主题
            "Mark a Key Project (Favorite)": 标记重点项目
            "Package & Download Project Files": 项目文件打包下载
            "Web Terminal": 网页终端
            "VI. Deep Research": VI-深度研究
            "Enable Research & Create a Task": 创建研究任务（启用 Research 系统）
            "Build an Agent Team": 组建智能体研究团队
            "Add the Graph Agent": 启用 Graph 绘图 Agent
            "Add the Image Agent": 启用图像绘制 Agent
            "Add a Custom Member": 创建自定义团队成员
            "Change a Member's Avatar": 更换成员形象
        - locale: en
          name: English
          build: true

nav:
  - Home: index.md
  - 'I. Master Mobius in 5 Minutes':
      - 'Xiaomo: Universal Shortcut': tutorial/13_xiaomo_control_hub.md
      - 'Concepts: Import a Project': tutorial/02a_import_project_and_begin_first_job.md
      - 'Concepts: Skills & Memory': tutorial/03a_using_skill_and_memory.md
  - 'II. Advanced Capabilities':
      - Add Remote Compute: tutorial/04_add_remote_server.md
      - Declare Cooperable Computers: tutorial/30_declare_cooperable_computers.md
      - Connect from Your PC (aimux): tutorial/27_aimux_from_pc.md
      - Xiaomo Assistant (Web): tutorial/05_using_xiaomo_assistant.md
      - Prevent Agent Idle (Patrol & Nudge): tutorial/06_prevent_agent_idle.md
      - Exclude Skills & Memory: tutorial/07_exclude_skills_memory.md
      - View Current Knowledge: tutorial/28_view_current_knowledge.md
      - Migrate Skills & Memory: tutorial/12_migrate_skill_memory.md
      - Search Session Content: tutorial/25_search_session_content.md
      - Switch Workspace Layout: tutorial/29_switch_workspace_layout.md
  - 'III. Admin Basics':
      - Add a User: tutorial/01_add_user.md
      - Monitor Agents: tutorial/08_monitor_agents.md
      - Configure Codex + a Model: tutorial/09_config_codex_model.md
      - Configure Claude Code + a Model: tutorial/10_config_claude_code_model.md
      - Limit Model Call Frequency: tutorial/11_limit_model_usage.md
  - 'IV. Mobius Self-Evolution':
      - Simple Self-Evolution Example: self-evo-demo.md
  - 'V. Tips':
      - Chat Input Tips: tutorial/14_chat_input_tips.md
      - Switch the Model Mid-Session: tutorial/15_switch_model_mid_session.md
      - Change the Frontend Theme: tutorial/16_change_frontend_theme.md
      - Mark a Key Project (Favorite): tutorial/17_favorite_project.md
      - Package & Download Project Files: tutorial/18_package_download_project.md
      - Web Terminal: tutorial/26_web_terminal.md
  - 'VI. Deep Research':
      - Enable Research & Create a Task: tutorial/19_enable_research_and_create.md
      - Build an Agent Team: tutorial/20_research_agent_team.md
      - Add the Graph Agent: tutorial/21_research_graph_agent.md
      - Add the Image Agent: tutorial/22_research_image_agent.md
      - Add a Custom Member: tutorial/23_custom_team_member.md
      - Change a Member's Avatar: tutorial/24_change_member_avatar.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.details

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/nutshellai-tech/mobius
    - icon: fontawesome/solid/globe
      link: https://mobius.nutshellai.cn/
