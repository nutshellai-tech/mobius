name: momo-mobile simulator screenshots

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "mobius/extension/momo-mobile/shared/**"
      - "mobius/extension/momo-mobile/androidApp/**"
      - "mobius/extension/momo-mobile/iosApp/**"
      - "mobius/extension/momo-mobile/scripts/compare-screenshot.sh"
      - ".github/workflows/momo-mobile-screenshot-verify.yml"

permissions:
  contents: read

env:
  PROJECT_DIR: mobius/extension/momo-mobile
  SCREENSHOT_DIFF_THRESHOLD: "0.05"

jobs:
  android-screenshot:
    runs-on: ubuntu-22.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Build Android APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon -PMOMO_BASE_URL="${{ vars.MOMO_BASE_URL }}" :androidApp:assembleDebug
      - name: Run emulator and capture screenshot
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            adb install -r "$PROJECT_DIR/androidApp/build/outputs/apk/debug/androidApp-debug.apk"
            adb shell am start -W -n com.mobius.momo/.MainActivity
            sleep 8
            mkdir -p screenshots/current screenshots/candidates
            adb exec-out screencap -p > screenshots/current/android.png
            "$PROJECT_DIR/scripts/compare-screenshot.sh" screenshots/current/android.png "$PROJECT_DIR/screenshots/baseline/android.png" screenshots/candidates
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: momo-android-screenshot-${{ github.run_id }}
          path: screenshots/

  ios-screenshot:
    runs-on: macos-14
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - run: brew install xcodegen imagemagick
      - name: Build, launch and capture iOS Simulator
        working-directory: ${{ env.PROJECT_DIR }}
        shell: bash
        run: |
          chmod +x gradlew
          DEVICE_ID="$(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          d=json.load(sys.stdin)["devices"]
          print(next(x["udid"] for xs in d.values() for x in xs if x["isAvailable"] and x["name"].startswith("iPhone")))
          ')"
          xcrun simctl boot "$DEVICE_ID" || true
          xcrun simctl bootstatus "$DEVICE_ID" -b
          if [[ "$(uname -m)" == "arm64" ]]; then TARGET=iosSimulatorArm64; TASK=linkDebugFrameworkIosSimulatorArm64; else TARGET=iosX64; TASK=linkDebugFrameworkIosX64; fi
          ./gradlew --no-daemon ":shared:$TASK"
          mkdir -p iosApp/Frameworks
          cp -R "shared/build/bin/$TARGET/debugFramework/MomoShared.framework" iosApp/Frameworks/
          cd iosApp
          xcodegen generate --spec project.yml
          xcodebuild -project iosApp.xcodeproj -scheme iosApp -configuration Debug -destination "platform=iOS Simulator,id=$DEVICE_ID" -derivedDataPath "$RUNNER_TEMP/momo-screenshot-derived" CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO MOMO_BASE_URL="${{ vars.MOMO_BASE_URL }}" build
          APP="$RUNNER_TEMP/momo-screenshot-derived/Build/Products/Debug-iphonesimulator/iosApp.app"
          xcrun simctl install "$DEVICE_ID" "$APP"
          xcrun simctl launch "$DEVICE_ID" com.mobius.momo.iosApp
          sleep 8
          cd "$GITHUB_WORKSPACE"
          mkdir -p screenshots/current screenshots/candidates
          xcrun simctl io "$DEVICE_ID" screenshot screenshots/current/ios.png
          "$PROJECT_DIR/scripts/compare-screenshot.sh" screenshots/current/ios.png "$PROJECT_DIR/screenshots/baseline/ios.png" screenshots/candidates
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: momo-ios-screenshot-${{ github.run_id }}
          path: screenshots/
