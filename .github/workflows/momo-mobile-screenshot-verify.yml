name: momo-mobile simulator screenshots

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "mobius/extension/momo-mobile/shared/**"
      - "mobius/extension/momo-mobile/androidApp/**"
      - "mobius/extension/momo-mobile/iosApp/**"
      - "mobius/extension/momo-mobile/scripts/compare-screenshot.sh"
      - ".github/workflows/momo-mobile-screenshot-verify.yml"

permissions:
  contents: read

env:
  PROJECT_DIR: mobius/extension/momo-mobile
  SCREENSHOT_DIFF_THRESHOLD: "0.05"

jobs:
  android-screenshot:
    name: Android API 34 screenshot
    runs-on: ubuntu-22.04
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.8"

      - name: Install Android emulator image
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platforms;android-35" \
            "system-images;android-34;google_apis;x86_64" \
            "platform-tools" \
            "emulator"
          echo "no" | avdmanager create avd \
            --force \
            --name Pixel_6_API_34 \
            --package "system-images;android-34;google_apis;x86_64" \
            --device "pixel_6"

      - name: Start emulator
        shell: bash
        run: |
          sudo chmod 666 /dev/kvm
          nohup emulator -avd Pixel_6_API_34 \
            -no-window \
            -no-audio \
            -no-boot-anim \
            -no-snapshot \
            -gpu swiftshader_indirect \
            > "$RUNNER_TEMP/android-emulator.log" 2>&1 &
          adb wait-for-device
          timeout 300 bash -c 'until [[ "$(adb shell getprop sys.boot_completed | tr -d "\r")" == "1" ]]; do sleep 2; done'
          adb shell input keyevent 82
          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0

      - name: Install and launch app
        working-directory: ${{ env.PROJECT_DIR }}
        shell: bash
        run: |
          gradle --no-daemon :androidApp:installDebug
          adb shell am force-stop com.mobius.momo
          adb shell am start -W -n com.mobius.momo/.MainActivity
          sleep 8

      - name: Capture Android screenshot
        shell: bash
        run: |
          mkdir -p screenshots/current screenshots/candidates
          adb shell screencap -p /sdcard/screen.png
          adb pull /sdcard/screen.png screenshots/current/android.png
          "$PROJECT_DIR/scripts/compare-screenshot.sh" \
            screenshots/current/android.png \
            "$PROJECT_DIR/screenshots/baseline/android.png" \
            screenshots/candidates

      - name: Upload Android screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-screenshot-${{ github.run_id }}.png
          path: screenshots/current/android.png
          if-no-files-found: error

      - name: Upload Android baseline candidate
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-baseline-candidate-${{ github.run_id }}
          path: screenshots/candidates/android.png
          if-no-files-found: ignore

      - name: Upload emulator log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-emulator-log-${{ github.run_id }}
          path: ${{ runner.temp }}/android-emulator.log

  ios-screenshot:
    name: iPhone 15 Pro screenshot
    runs-on: macos-14
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.8"

      - name: Install screenshot tools
        shell: bash
        run: brew install xcodegen imagemagick

      - name: Boot iPhone 15 Pro
        shell: bash
        run: |
          DEVICE_ID="$(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          devices = json.load(sys.stdin)["devices"]
          matches = [
              device["udid"]
              for runtime_devices in devices.values()
              for device in runtime_devices
              if device["name"] == "iPhone 15 Pro" and device["isAvailable"]
          ]
          if not matches:
              raise SystemExit("iPhone 15 Pro simulator is unavailable")
          print(matches[0])
          ')"
          echo "DEVICE_ID=$DEVICE_ID" >> "$GITHUB_ENV"
          xcrun simctl boot "$DEVICE_ID"
          xcrun simctl bootstatus "$DEVICE_ID" -b

      - name: Build shared framework
        working-directory: ${{ env.PROJECT_DIR }}
        shell: bash
        run: |
          if [[ "$(uname -m)" == "arm64" ]]; then
            TARGET="iosSimulatorArm64"
            TASK="linkDebugFrameworkIosSimulatorArm64"
          else
            TARGET="iosX64"
            TASK="linkDebugFrameworkIosX64"
          fi
          gradle --no-daemon ":shared:$TASK"
          mkdir -p iosApp/Frameworks
          cp -R "shared/build/bin/$TARGET/debugFramework/MomoShared.framework" iosApp/Frameworks/

      - name: Generate and build iOS app
        working-directory: ${{ env.PROJECT_DIR }}/iosApp
        shell: bash
        run: |
          xcodegen generate --spec project.yml
          xcodebuild \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            -derivedDataPath "$RUNNER_TEMP/momo-derived-data" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Install and launch iOS app
        shell: bash
        run: |
          APP_PATH="$RUNNER_TEMP/momo-derived-data/Build/Products/Debug-iphonesimulator/iosApp.app"
          xcrun simctl install "$DEVICE_ID" "$APP_PATH"
          xcrun simctl launch "$DEVICE_ID" com.mobius.momo.iosApp
          sleep 8

      - name: Capture iOS screenshot
        shell: bash
        run: |
          mkdir -p screenshots/current screenshots/candidates
          xcrun simctl io "$DEVICE_ID" screenshot screenshots/current/ios.png
          "$PROJECT_DIR/scripts/compare-screenshot.sh" \
            screenshots/current/ios.png \
            "$PROJECT_DIR/screenshots/baseline/ios.png" \
            screenshots/candidates

      - name: Upload iOS screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-screenshot-${{ github.run_id }}.png
          path: screenshots/current/ios.png
          if-no-files-found: error

      - name: Upload iOS baseline candidate
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-baseline-candidate-${{ github.run_id }}
          path: screenshots/candidates/ios.png
          if-no-files-found: ignore
