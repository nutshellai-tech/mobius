appId: com.agentmatrix.mobius.desktop
productName: Mobius Desktop
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
directories:
  output: release
files:
  - out/**/*
  - package.json
extraMetadata:
  main: out/main/index.js
asar: true
# 内置 python：构建前由 prep-python:<target> 把对应 arch 的 python-build-standalone
# 拷到 resources/python/（canonical，按构建目标切换）。多 arch 共用这一条。
extraResources:
  - from: resources/python
    to: python
    filter: ["**/*"]
  # 应用图标：随包下发到 resources/icon.png，供 BrowserWindow({icon}) 运行时读取。
  # mac 的 .app 内 icns 由 build/icon.png 在构建期自动生成；win .exe 内嵌图标需 rcedit(wine)。
  - from: build/icon.png
    to: icon.png
win:
  target:
    - zip
  # Linux 交叉打 Windows 包：signApp 需要 wine 跑 signtool（即使无证书也要编辑 exe 版本信息）。
  # 测试阶段免签名，关掉这步即可产出可用 zip；正式分发再在 Windows 机签名。
  signAndEditExecutable: false
mac:
  target:
    - dmg
    - zip
  # identity 不设置：electron-builder 自动选 keychain 里 "Developer ID Application" 证书签名。
  # （identity: null 会显式跳过签名；手动指定证书名须去掉 "Developer ID Application:" 前缀。）
  hardenedRuntime: true
  gatekeeperAssess: false
  # 公证：构建前须 export APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID。
  # electron-builder 调 notarytool 提交 Apple，通过后自动 staple 到 dmg，用户可双击直接打开。
  notarize:
    teamId: 6FMVHL6RLY
  # entitlements：Electron 需 allow-jit/allow-unsigned-executable-memory；
  # disable-library-validation 让内置 python-build-standalone 的动态库可加载（公证必需）。
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
