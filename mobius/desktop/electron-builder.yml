appId: com.agentmatrix.mobius.desktop
productName: Mobius Desktop
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
directories:
  output: release
files:
  - out/**/*
  - package.json
extraMetadata:
  main: out/main/index.js
# 内置 python-build-standalone (构建期由 scripts/fetch-python.ts 下载到 resources/python-win-x64)
# 打包后位于 process.resourcesPath/python，运行期 python-runtime.ts 从这里取解释器。
extraResources:
  - from: resources/python-win-x64
    to: python
    filter:
      - "**/*"
asar: true
win:
  target:
    - zip
  # Linux 上交叉打 Windows 包：signApp 需要 wine 跑 signtool（即使无证书也要编辑 exe 版本信息）。
  # 测试阶段免签名，关掉这步即可产出可用 zip；正式分发再在 Windows 机签名。
  signAndEditExecutable: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
