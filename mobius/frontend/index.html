<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>莫比乌斯AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>
    // 同步阻塞拉取品牌配置 (logo/系统名/Tab 标题), 避免 React 挂载后的首屏闪烁.
    // 接口只返回 3 个字段, 极小; 同步 XHR 等待 ~10-50ms 可接受.
    (function () {
      var DEFAULT = { hideLogo: false, systemNameZh: '莫比乌斯AI', systemNameEn: 'Mobius' };
      var branding = DEFAULT;
      try {
        var x = new XMLHttpRequest();
        x.open('GET', '/api/auth/branding', false); // 同步
        x.send();
        if (x.status === 200) {
          var j = JSON.parse(x.responseText);
          branding = {
            hideLogo: !!j.hideLogo,
            systemNameZh: typeof j.systemNameZh === 'string' ? j.systemNameZh : DEFAULT.systemNameZh,
            systemNameEn: typeof j.systemNameEn === 'string' ? j.systemNameEn : DEFAULT.systemNameEn,
          };
        }
      } catch (e) { /* 拉失败时回退默认值, 不阻塞首屏 */ }
      window.__BRANDING__ = branding;
      document.title = branding.systemNameZh || ' ';
    })();
  </script>
</head>
<body class="bg-bg-0 text-gray-100 antialiased">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
