name: iosApp
options:
  bundleIdPrefix: com.mobius.momo
settings:
  base:
    IPHONEOS_DEPLOYMENT_TARGET: "15.0"
    SWIFT_VERSION: "5.0"
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGNING_REQUIRED: "NO"
    MOMO_BASE_URL: ""
targets:
  iosApp:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: iosApp
    dependencies:
      - framework: Frameworks/MomoShared.framework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mobius.momo.iosApp
        PRODUCT_NAME: iosApp
        INFOPLIST_FILE: iosApp/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
schemes:
  iosApp:
    build:
      targets:
        iosApp: all
    run:
      config: Debug
