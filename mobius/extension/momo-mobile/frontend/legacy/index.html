<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>小莫助理 App 调试版</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg?v=momo-orb-2" />
    <link rel="shortcut icon" type="image/svg+xml" href="./favicon.svg?v=momo-orb-2" />
    <link rel="apple-touch-icon" href="./favicon.svg?v=momo-orb-2" />
    <script>
      (() => {
        const saved = localStorage.getItem('momo-preview-theme-mode')
        const mode = saved === 'light' || saved === 'dark' ? saved : 'system'
        const dark = mode === 'dark'
          || (mode === 'system' && matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.dataset.theme = dark ? 'dark' : 'light'
        document.documentElement.style.colorScheme = dark ? 'dark' : 'light'
      })()
    </script>
    <link rel="stylesheet" href="./preview.css" />
  </head>
  <body>
    <div id="app" class="phone-shell" data-screen="boot">
      <div class="statusbar"></div>
      <main id="root" class="screen"></main>
    </div>
    <script src="./composer-state.js"></script>
    <script src="./preview.js"></script>
  </body>
</html>
