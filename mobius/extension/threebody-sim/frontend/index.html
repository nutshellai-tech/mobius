<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>三体 N 体模拟 · mobius 拓展</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
  :root {
    --bg-0: #02030a;
    --bg-1: #06081a;
    --panel: rgba(8, 12, 28, 0.78);
    --panel-bd: rgba(120, 140, 220, 0.22);
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --accent: #7dd3fc;
    --accent-2: #c084fc;
    --warn: #fbbf24;
    --err: #f87171;
    --ok: #34d399;
  }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: radial-gradient(ellipse at center, var(--bg-1) 0%, var(--bg-0) 100%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  #stage { position: fixed; inset: 0; }
  canvas { display: block; }
  .panel {
    position: fixed;
    background: var(--panel);
    border: 1px solid var(--panel-bd);
    border-radius: 10px;
    padding: 12px 14px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.45);
    user-select: none;
    pointer-events: auto;
  }
  #topbar {
    top: 14px; left: 14px; right: 14px;
    display: flex; gap: 10px; align-items: center;
    padding: 10px 14px;
    overflow-x: auto;
    overflow-y: hidden;
  }
  #topbar h1 {
    margin: 0; font-size: 14px; font-weight: 700; letter-spacing: 0.5px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    flex: 0 0 auto;
    white-space: nowrap;
  }
  #topbar .sub { font-size: 11px; color: var(--text-dim); margin-left: -4px; }
  .ctrl-group { display: flex; gap: 8px; align-items: center; flex: 0 0 auto; }
  .ctrl-group + .ctrl-group { padding-left: 10px; border-left: 1px solid var(--panel-bd); }
  .ctrl { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim); }
  .ctrl input[type=range] {
    width: 110px; accent-color: var(--accent);
    background: transparent;
  }
  .ctrl input[type=number] {
    width: 50px; background: rgba(0,0,0,0.4); color: var(--text);
    border: 1px solid var(--panel-bd); border-radius: 4px; padding: 2px 6px; font: inherit;
  }
  .ctrl select {
    background: rgba(0,0,0,0.4); color: var(--text);
    border: 1px solid var(--panel-bd); border-radius: 4px; padding: 3px 6px; font: inherit;
    max-width: 160px;
  }
  .btn {
    font: inherit; font-size: 12px; font-weight: 500;
    background: linear-gradient(135deg, rgba(125,211,252,0.18), rgba(192,132,252,0.18));
    color: var(--text);
    border: 1px solid var(--panel-bd);
    padding: 5px 10px; border-radius: 6px; cursor: pointer;
    transition: all 0.15s ease;
  }
  .btn:hover { border-color: var(--accent); color: #fff; }
  .btn.primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); border-color: transparent; }
  .btn.primary:hover { filter: brightness(1.15); }
  .btn.danger { color: var(--err); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  #stats {
    top: 70px; right: 14px; min-width: 200px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px; line-height: 1.65;
  }
  #stats .row { display: flex; justify-content: space-between; gap: 12px; }
  #stats .row b { color: var(--accent); font-weight: 600; }
  #stats .row.warn b { color: var(--warn); }
  #stats h2 { margin: 0 0 8px; font-size: 12px; color: var(--text-dim); font-weight: 600; letter-spacing: 0.5px; }
  #stats .div { height: 1px; background: var(--panel-bd); margin: 8px 0; }
  #legend {
    bottom: 14px; left: 14px; max-width: 320px;
    font-size: 11px; color: var(--text-dim); line-height: 1.7;
  }
  #legend h2 { margin: 0 0 6px; font-size: 12px; color: var(--text); font-weight: 600; }
  #legend kbd {
    background: rgba(255,255,255,0.08); padding: 1px 5px; border-radius: 3px;
    font-family: ui-monospace, monospace; font-size: 10px; color: var(--text);
  }
  #scenarios-panel {
    bottom: 14px; right: 14px; min-width: 220px; max-width: 280px;
  }
  #scenarios-panel h2 { margin: 0 0 8px; font-size: 12px; color: var(--text-dim); font-weight: 600; letter-spacing: 0.5px; }
  .scn-list {
    list-style: none; margin: 0; padding: 0; max-height: 180px; overflow-y: auto;
  }
  .scn-list li {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 0; border-bottom: 1px solid rgba(120,140,220,0.08);
    font-size: 12px;
  }
  .scn-list li:last-child { border-bottom: none; }
  .scn-list .name { color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .scn-list .meta { color: var(--text-dim); font-size: 10px; margin-right: 8px; }
  .scn-list .actions { display: flex; gap: 4px; }
  .scn-list button {
    background: transparent; color: var(--text-dim); border: none; cursor: pointer;
    padding: 1px 5px; font-size: 10px; border-radius: 3px;
  }
  .scn-list button:hover { color: var(--accent); background: rgba(125,211,252,0.1); }
  .scn-list button.del:hover { color: var(--err); background: rgba(248,113,113,0.1); }
  .scn-empty { color: var(--text-dim); font-size: 11px; font-style: italic; }
  #save-row { display: flex; gap: 4px; margin-top: 8px; }
  #save-row input {
    flex: 1; background: rgba(0,0,0,0.4); color: var(--text);
    border: 1px solid var(--panel-bd); border-radius: 4px;
    padding: 4px 6px; font: inherit; font-size: 11px;
  }
  #toast {
    position: fixed; bottom: 50%; left: 50%; transform: translate(-50%, 50%);
    background: rgba(0,0,0,0.85); color: #fff; padding: 10px 20px;
    border-radius: 6px; font-size: 13px; pointer-events: none;
    opacity: 0; transition: opacity 0.25s;
    z-index: 100;
  }
  #toast.show { opacity: 1; }
  #toast.err { color: var(--err); }
  #toast.ok { color: var(--ok); }
  /* hide number input arrows for cleaner look */
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
  @media (max-width: 700px) {
    .panel { border-radius: 8px; }
    #topbar {
      top: 8px; left: 8px; right: 8px;
      gap: 8px;
      padding: 8px 10px;
    }
    #topbar .sub { display: none; }
    .ctrl-group + .ctrl-group { padding-left: 8px; }
    .ctrl input[type=range] { width: 84px; }
    .ctrl select { max-width: 150px; }
    #stats {
      top: 76px; right: 8px;
      min-width: 190px;
      max-width: calc(100vw - 16px);
    }
    #legend { display: none; }
    #scenarios-panel {
      left: 8px; right: 8px; bottom: 8px;
      min-width: 0;
      max-width: none;
    }
    #save-row input { min-width: 0; }
  }
</style>
</head>
<body>
<div id="stage"></div>

<div id="topbar" class="panel">
  <h1>三体 N 体模拟</h1><span class="sub">· threejs</span>
  <div class="ctrl-group" style="margin-left: 10px;">
    <div class="ctrl"><label>N =</label>
      <input type="range" id="n-slider" min="2" max="50" value="3" step="1">
      <input type="number" id="n-input" min="2" max="50" value="3" step="1">
    </div>
    <div class="ctrl">
      <select id="preset">
        <option value="figure8">图八轨道 (N=3)</option>
        <option value="triangle">等边三角形 (N=3)</option>
        <option value="binary">双星 (N=2)</option>
        <option value="solar">类太阳系 (N=4)</option>
        <option value="pentagon">五角形 (N=5)</option>
        <option value="cluster">随机团 (任意 N)</option>
        <option value="ring">光环 (任意 N)</option>
      </select>
    </div>
  </div>
  <div class="ctrl-group">
    <button id="apply" class="btn primary">应用</button>
    <button id="play" class="btn">暂停</button>
    <button id="reset" class="btn">重置</button>
  </div>
  <div class="ctrl-group">
    <div class="ctrl"><label>速度</label>
      <input type="range" id="speed" min="0.1" max="4" step="0.05" value="1">
    </div>
    <div class="ctrl"><label>G</label>
      <input type="range" id="gravity" min="0.1" max="3" step="0.05" value="1">
    </div>
  </div>
  <div class="ctrl-group">
    <div class="ctrl"><label><input type="checkbox" id="trails" checked> 拖尾</label></div>
    <div class="ctrl"><label><input type="checkbox" id="glow" checked> 发光</label></div>
    <div class="ctrl"><label><input type="checkbox" id="stars" checked> 星空</label></div>
    <div class="ctrl"><label><input type="checkbox" id="autorotate"> 自转</label></div>
  </div>
  <div class="ctrl-group" style="margin-left: auto;">
    <button id="who" class="btn">我</button>
  </div>
</div>

<div id="stats" class="panel">
  <h2>状态</h2>
  <div class="row"><span>时间</span><b id="t-time">0.00</b></div>
  <div class="row"><span>天体数</span><b id="t-n">3</b></div>
  <div class="row"><span>动能 KE</span><b id="t-ke">0.00</b></div>
  <div class="row"><span>势能 PE</span><b id="t-pe">0.00</b></div>
  <div class="row warn"><span>总能量 E</span><b id="t-e">0.00</b></div>
  <div class="row"><span>动量 |P|</span><b id="t-p">0.00</b></div>
  <div class="div"></div>
  <div class="row"><span>FPS</span><b id="t-fps">--</b></div>
  <div class="row"><span>最近事件</span><b id="t-event">--</b></div>
</div>

<div id="legend" class="panel">
  <h2>操作</h2>
  <div><kbd>左键拖动</kbd> 旋转视角 · <kbd>滚轮</kbd> 缩放 · <kbd>右键拖动</kbd> 平移</div>
  <div><kbd>左键单击天体</kbd> 选中并显示信息</div>
  <div><kbd>选中后拖动</kbd> 给该天体一个初速度脉冲</div>
  <div><kbd>Space</kbd> 暂停 / 播放 · <kbd>R</kbd> 重置</div>
</div>

<div id="scenarios-panel" class="panel">
  <h2>场景存档</h2>
  <ul class="scn-list" id="scn-list"><li class="scn-empty">加载中...</li></ul>
  <div id="save-row">
    <input type="text" id="scn-name" placeholder="场景名..." maxlength="32">
    <button id="scn-save" class="btn primary">保存</button>
  </div>
</div>

<div id="toast"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module" src="main.js"></script>
</body>
</html>
