<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生日派对邀请</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="invite-shell">
    <section class="invite-card" aria-labelledby="partyTitle">
      <div class="confetti-field" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>

      <section class="hero">
        <p class="eyebrow">A little celebration</p>
        <h1 id="partyTitle">生日派对邀请</h1>
        <p class="description" id="partyIntro">想把这一晚留给蛋糕、灯光和朋友。来一起吃饭、聊天，也给这一年留下热闹的一页。</p>
        <div class="hero-ribbon" aria-hidden="true">
          <span>cake</span>
          <span>music</span>
          <span>wishes</span>
        </div>
      </section>

      <section class="details" aria-label="聚会信息">
        <article class="detail-item">
          <span class="detail-icon" aria-hidden="true">✦</span>
          <div>
            <p class="detail-label">时间</p>
            <p class="detail-value" id="partyTime">2026 年 7 月 18 日 18:30</p>
          </div>
        </article>
        <article class="detail-item">
          <span class="detail-icon" aria-hidden="true">⌂</span>
          <div>
            <p class="detail-label">地点</p>
            <p class="detail-value" id="partyPlace">星光花园餐厅 · 露台包间</p>
          </div>
        </article>
      </section>

      <section class="rsvp" aria-labelledby="rsvpTitle">
        <div class="section-heading">
          <p class="section-kicker">RSVP</p>
          <h2 id="rsvpTitle">告诉我你会来</h2>
        </div>
        <form id="rsvpForm" class="rsvp-form" novalidate>
          <label for="guestName">你的名字</label>
          <div class="input-row">
            <input id="guestName" name="guestName" type="text" autocomplete="name" maxlength="40" placeholder="例如：小林" required>
            <button id="submitBtn" type="submit">确认参加</button>
          </div>
          <p id="formHint" class="form-hint">提交后会显示确认消息，方便你知道邀请已收到。</p>
        </form>
        <div id="confirmation" class="confirmation" role="status" aria-live="polite" hidden></div>
        <p id="saveState" class="save-state" aria-live="polite"></p>
      </section>
    </section>
  </main>
  <script type="module" src="./main.js"></script>
</body>
</html>
