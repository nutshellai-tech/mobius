<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>吃豆人 · mobius 拓展</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0b0f17; color: #cbd5e1; font-family: ui-monospace, monospace; }
  .wrap { height: 100%; display: flex; gap: 24px; padding: 24px; box-sizing: border-box; }
  .game-col { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .lb-col { flex: 1; min-width: 280px; display: flex; flex-direction: column; gap: 12px; }
  h1 { margin: 0; font-size: 18px; font-weight: 700; color: #e2e8f0; }
  .sub { font-size: 12px; color: #94a3b8; }
  canvas { background: #000; border: 1px solid #1e293b; image-rendering: pixelated; }
  .hud { display: flex; gap: 20px; font-size: 13px; }
  .hud b { color: #fbbf24; }
  .btn { font: inherit; background: #6366f1; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .btn:disabled { background: #475569; cursor: not-allowed; }
  .btn:hover:not(:disabled) { background: #4f46e5; }
  .lb-panel { background: #0f172a; border: 1px solid #1e293b; border-radius: 8px; padding: 14px; }
  .lb-panel h2 { font-size: 14px; margin: 0 0 10px; color: #e2e8f0; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th, td { padding: 6px 8px; text-align: left; border-bottom: 1px solid #1e293b; }
  th { color: #64748b; font-weight: 500; }
  .rank-1 td { color: #fbbf24; font-weight: 700; }
  .rank-2 td { color: #cbd5e1; }
  .rank-3 td { color: #f59e0b; }
  .me { background: rgba(99,102,241,0.10); }
  .msg { font-size: 12px; color: #94a3b8; min-height: 18px; }
  .err { color: #f87171; }
  .ok { color: #34d399; }
  .legend { font-size: 11px; color: #64748b; line-height: 1.6; }
</style>
</head>
<body>
<div class="wrap">
  <div class="game-col">
    <h1>吃豆人 <span class="sub">· mobius 拓展样例</span></h1>
    <div class="hud">
      <div>得分: <b id="score">0</b></div>
      <div>生命: <b id="lives">3</b></div>
      <div>状态: <b id="status">就绪</b></div>
    </div>
    <canvas id="game" width="420" height="420"></canvas>
    <div style="display:flex; gap:8px;">
      <button id="start" class="btn">开始 / 重开 (Enter)</button>
      <button id="who" class="btn" style="background:#475569;">我是谁?</button>
    </div>
    <div class="msg" id="msg"></div>
    <div class="legend">
      方向键 / WASD 移动. 吃掉所有豆子 = 通关 (+500). 撞到鬼 = 失去 1 命. 命数 0 = 游戏结束并上榜.
    </div>
  </div>
  <div class="lb-col">
    <div class="lb-panel">
      <h2>🏆 排行榜 Top 10</h2>
      <table id="lb-table">
        <thead><tr><th style="width:36px;">#</th><th>玩家</th><th style="text-align:right;">分数</th></tr></thead>
        <tbody id="lb-body"><tr><td colspan="3" style="color:#64748b;">加载中...</td></tr></tbody>
      </table>
      <div style="margin-top:10px;">
        <button id="refresh" class="btn" style="background:#0ea5e9; font-size:12px; padding:6px 12px;">刷新</button>
      </div>
    </div>
    <div class="lb-panel">
      <h2>说明</h2>
      <div class="legend">
        所有数据通过 <code>POST /api/ext</code> 走 mobius 后端转发, handler 跑在 worker_thread 沙箱内.
        分数存于 <code>protected_data/extension/pacman/leaderboard.json</code>, 30s 超时, 5MB 返回上限.
      </div>
    </div>
  </div>
</div>
<script type="module" src="main.js"></script>
</body>
</html>
