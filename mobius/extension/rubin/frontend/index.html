<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rubin结构</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow">Mobius Extension</p>
      <h1>rubin结构</h1>
      <p class="description">rubin</p>
    </section>

    <section class="panel">
      <div>
        <div class="label">当前拓展</div>
        <div class="value" id="extensionName">rubin</div>
      </div>
      <div>
        <div class="label">当前用户</div>
        <div class="value" id="identity">-</div>
      </div>
      <textarea id="noteInput" placeholder="写一点只有你能看到的调试备注"></textarea>
      <div class="actions">
        <button id="saveBtn" type="button">保存备注</button>
        <button id="loadBtn" type="button">读取备注</button>
      </div>
      <div id="status" class="status"></div>
    </section>
  </main>
  <script type="module" src="./main.js"></script>
</body>
</html>
