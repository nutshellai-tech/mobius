<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金融新闻墙 · Live Market Pulse</title>
  <link rel="icon" href="./favicon.svg">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <canvas id="particleCanvas" class="particle-canvas" aria-hidden="true"></canvas>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <img src="./favicon.svg" alt="" class="brand-icon">
        <div>
          <h1>金融新闻墙</h1>
          <div class="muted">全球市场事件雷达 · 演示数据</div>
        </div>
      </div>

      <div class="top-search">
        <input id="globalSearch" type="search" placeholder="搜索新闻、资产、主题">
      </div>

      <div class="top-actions">
        <span id="refreshStatus" class="status-pill">LIVE SIMULATION</span>
        <button id="pulseBtn" class="secondary-btn">触发脉冲</button>
      </div>
    </header>

    <main id="app" class="app-main" aria-live="polite"></main>
  </div>

  <div id="toast" class="toast" role="status"></div>

  <script type="module" src="./main.js"></script>
</body>
</html>
