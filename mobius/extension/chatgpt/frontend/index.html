<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatGPT 纯对话</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="chat-shell">
    <aside class="sidebar" aria-label="对话列表">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">C</div>
        <div>
          <h1>ChatGPT</h1>
          <p>纯对话</p>
        </div>
      </div>
      <button id="newChatBtn" class="primary-btn" type="button">新对话</button>
      <div id="conversationList" class="conversation-list" role="list"></div>
    </aside>

    <section class="chat-main" aria-label="聊天窗口">
      <header class="chat-header">
        <div>
          <h2 id="chatTitle">新对话</h2>
          <p id="chatMeta">本地历史 · 只显示对话内容</p>
        </div>
        <div class="header-actions">
          <label class="model-picker">
            <span>模型</span>
            <select id="modelSelect"></select>
          </label>
          <button id="clearBtn" class="secondary-btn" type="button">清空</button>
        </div>
      </header>

      <div id="messages" class="messages" aria-live="polite"></div>

      <form id="composer" class="composer">
        <div id="attachmentList" class="attachment-list" hidden></div>
        <input id="fileInput" type="file" multiple hidden>
        <div class="composer-row">
          <div class="input-wrap">
            <textarea id="messageInput" rows="1" placeholder="输入消息，Enter 发送，Shift+Enter 换行"></textarea>
          </div>
          <div class="composer-actions" aria-label="输入操作">
            <button id="attachBtn" class="tool-btn" type="button" title="添加图片或附件">附件</button>
            <button id="voiceBtn" class="tool-btn" type="button" title="语音输入">语音</button>
            <button id="sendBtn" class="send-btn" type="button">发送</button>
          </div>
        </div>
      </form>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="./main.js"></script>
</body>
</html>
